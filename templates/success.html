<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success - Email Draft Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #BFDFF5 0%, #a8c8e8 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 500px;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { color: #333; margin-bottom: 16px; }
        p { color: #666; margin-bottom: 30px; line-height: 1.6; }
        .actions {
            display: flex;
            gap: 16px;
            justify-content: center;
        }
        button, .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary {
            background: linear-gradient(135deg, #4a9fd4 0%, #2f7ab8 100%);
            color: white;
        }
        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Success!</h1>
        <p>Your email has been {{ action }}.</p>

        <div class="actions">
            <a href="/" class="btn btn-primary">Create Another Email</a>
            {% if action == 'saved as draft' %}
            <a href="https://mail.google.com/mail/#drafts" target="_blank" class="btn btn-secondary">Open Gmail Drafts</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
