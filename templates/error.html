<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Email Draft Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .icon { font-size: 64px; margin-bottom: 20px; text-align: center; }
        h1 { color: #333; margin-bottom: 16px; text-align: center; }
        .error-box {
            background: #fef3f2;
            border: 2px solid #fecaca;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 24px;
        }
        .error-box code {
            display: block;
            background: #fee2e2;
            padding: 12px;
            border-radius: 4px;
            font-size: 13px;
            overflow-x: auto;
            margin-top: 8px;
            color: #991b1b;
        }
        .actions { text-align: center; }
        button, .btn {
            padding: 14px 28px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">⚠️</div>
        <h1>Something Went Wrong</h1>
        <div class="error-box">
            <p>Here's the error message:</p>
            <code>{{ error }}</code>
        </div>
        <div class="actions">
            <a href="/" class="btn">Go Back Home</a>
        </div>
    </div>
</body>
</html>
