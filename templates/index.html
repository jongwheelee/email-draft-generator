<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Draft Generator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }
        .login-banner {
            background: #e8f4fd;
            border: 2px solid #3498db;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
        }
        .login-banner a {
            color: #2980b9;
            font-weight: bold;
        }
        form { margin-top: 20px; }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }
        textarea {
            min-height: 120px;
            resize: vertical;
            font-family: inherit;
        }
        .tone-options {
            display: flex;
            gap: 20px;
        }
        .tone-options label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: normal;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        .logout-link {
            text-align: right;
            margin-bottom: 20px;
        }
        .logout-link a {
            color: #999;
            text-decoration: none;
            font-size: 14px;
        }
        .logout-link a:hover { color: #666; }
    </style>
</head>
<body>
    <div class="container">
        {% if logged_in %}
        <div class="logout-link">
            <a href="/logout">Logout</a>
        </div>
        {% else %}
        <div class="login-banner">
            <strong>Connect Gmail First!</strong><br>
            You need to connect your Gmail account to generate and send emails.<br><br>
            <a href="/login">👉 Connect Gmail</a>
        </div>
        {% endif %}

        <h1>✉️ Email Draft Generator</h1>
        <p class="subtitle">AI-powered email writing with Claude</p>

        {% if logged_in %}
        <form action="/generate" method="POST">
            <div class="form-group">
                <label for="recipient">Recipient Name/Email</label>
                <input type="text" id="recipient" name="recipient" placeholder="e.g., John Smith or john@example.com" required>
            </div>

            <div class="form-group">
                <label for="purpose">Purpose of the Email</label>
                <input type="text" id="purpose" name="purpose" placeholder="e.g., Request a meeting, Follow up on project, Say thank you" required>
            </div>

            <div class="form-group">
                <label for="key_points">Key Points to Include</label>
                <textarea id="key_points" name="key_points" placeholder="List the main points you want to cover...&#10;- Point 1&#10;- Point 2&#10;- Point 3" required></textarea>
            </div>

            <div class="form-group">
                <label>Tone</label>
                <div class="tone-options">
                    <label>
                        <input type="radio" name="tone" value="formal" checked>
                        Formal (business, professional)
                    </label>
                    <label>
                        <input type="radio" name="tone" value="casual">
                        Casual (friendly, relaxed)
                    </label>
                </div>
            </div>

            <button type="submit">✨ Generate Draft</button>
        </form>
        {% endif %}
    </div>
</body>
</html>
